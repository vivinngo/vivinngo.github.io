baseurl = "https://vivinngo.github.io/"
title = "Vi Ngo"
theme = "hugo-theme-cleanwhite"
locale = "en-us"
preserveTaxonomyNames = true

[services]
  [services.disqus]
    shortname = ""
  [services.googleAnalytics]
    id = ""

[pagination]
  pagerSize = 5

[outputs]
home = ["HTML", "RSS"]

[params]
  header_image = "img/home_bg.jpeg"
  SEOTitle = "Vi Ngo | Portfolio"
  description = "AI Engineer — building intelligent systems and sharing what I learn."
  keyword = "Vi Ngo, vivinngo, AI Engineer, Machine Learning, Portfolio, Blog"
  slogan = "Learn and share AI/ML knowledge"
  upstreamAttribution = true

  image_404 = "img/404-bg.jpg"
  title_404 = "Page not found :("
  omit_categories = false

  page_view_counter = false
  leancloud_app_id = ""
  leancloud_app_key = ""

  algolia_search = false
  algolia_appId = ""
  algolia_indexName = ""
  algolia_apiKey = ""

  sidebar_about_description = "AI Engineer | Lifelong Learner"
  sidebar_avatar = "img/avt.png"

  featured_tags = true
  featured_condition_size = 0

  ba_track_id = ""
  disqus_proxy = ""
  disqus_site = ""
  twikoo_env_id = ""

  artalk_enable = false
  artalk_server = ""
  artalk_site = ""

  reward = false

  friends = false
  bookmarks = false
  about_me = true
  last_posts = true

  dark_mode_toggle = false

  custom_css = ["css/custom.css"]

  [params.social]
  rss      = true
  email    = "vingo.data@gmail.com"
  linkedin = "https://www.linkedin.com/in/nttvi/"
  github   = "https://github.com/vivinngo"

  [[params.additional_menus]]
  title = "NOTES"
  href  = "/notes/"
  [[params.additional_menus]]
  title = "LEARNING MATERIALS"
  href  = "/learning-materials/"
  [[params.additional_menus]]
  title = "ABOUT"
  href  = "/about/"

[markup]
  [markup.tableOfContents]
    endLevel = 2
    startLevel = 1
  [markup.highlight]
    style = "dracula"
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = [['\(', '\)']]
