<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
{{ partial "head.html" . }}
{{ partial "nav.html" . }}
<!-- Page Header -->
{{ block "header" .}}
<header class="intro-header" style="background-image: url('{{ .Site.Params.header_image | relURL }}'); min-height: 70vh; position: relative; display: flex; align-items: center;">
    <div class="container" style="position: relative; z-index: 1;">
        <div class="row">
            <div class="col-lg-8 col-lg-offset-2 col-md-10 col-md-offset-1">
                <div class="site-heading">
                    <h1 style="color: #483C32; font-size: 6rem; font-weight: 700; margin-bottom: 0.5rem;">Vi Ngo's blog</h1>
                    <span class="subheading" style="color: #483C32; font-size: 2rem; display: block;">{{ .Site.Params.slogan }}</span>
                </div>
            </div>
        </div>
    </div>
</header>
{{ end }}

{{ block "main" . }}
{{ end }}

{{ partial "footer.html" . }}
{{ if .Store.Get "hasMermaid" }}
  <!-- Use the UMD build instead of ESM so Cloudflare won't rewrite it -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"
          data-cfasync="false" defer></script>
  <script data-cfasync="false" defer>
    document.addEventListener('DOMContentLoaded', function () {
      mermaid.initialize({ startOnLoad: true, securityLevel: 'loose' });
    });
  </script>
{{ end }}
</body>
</html>
